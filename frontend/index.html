<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PPR-Bot — Public Procurement Rules 2025</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <header>
    <h1>PPR-Bot</h1>
    <p>Ask about the Public Procurement Rules (PPR) 2025 · পাবলিক প্রকিউরমেন্ট বিধিমালা, ২০২৫</p>
  </header>

  <main id="chat"></main>

  <form id="composer">
    <input
      id="input"
      type="text"
      autocomplete="off"
      placeholder="Ask a question in Bangla or English…"
    />
    <button type="submit" id="send">Send</button>
  </form>

  <script src="/static/js/chat.js"></script>
</body>
</html>
